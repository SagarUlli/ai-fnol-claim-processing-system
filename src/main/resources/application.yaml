spring:
    application:
        name: nexusclaim

ollama:
    url: ${OLLAMA_URL} # Local Ollama API URL
    model: ${OLLAMA_MODEL}
    stream:
        false

        # H2 Database (In-Memory for Dev)
datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

h2:
    console:
        enabled: true
        path: /h2-console

# JPA / Hibernate
jpa:
    hibernate:
        ddl-auto: update
    show-sql: true
    properties:
        hibernate:format_sql: true

# File Upload Limits
servlet:
    multipart:
        max-file-size: 10MB
        max-request-size: 10MB

# LangChain4j Example Config (for Ollama/OpenAI)
langchain4j:
    ollama:
        chat-model:
            base-url: http://localhost:11434
            model-name: llama3
            timeout: 180s

# Swagger/OpenAPI
springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html

# File Storage Location
storage:
    location: uploads/claims
